<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starter Website</title>
  <link rel="stylesheet" href="basic_styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main class="page">
    <section id="home" class="hero">
      <h1>Build a Basic Website</h1>
      <p>This is a simple starter page using plain HTML, CSS, and JavaScript.</p>
      <button id="ctaButton">Click me</button>
    </section>

    <section id="about">
      <h2>About</h2>
      <p>Use sections like this for content blocks on a beginner website.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <form class="contact-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="basic_app.js" defer></script>
</body>
</html>
